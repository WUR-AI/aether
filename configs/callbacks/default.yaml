defaults:
  - model_checkpoint
  - early_stopping
  - model_summary
  - rich_progress_bar
  - _self_

model_checkpoint:
  dirpath: ${paths.checkpoint_dir}
  filename: "epoch_{epoch:03d}"
  monitor: "val_loss"
  mode: "min"
  save_last: False
  auto_insert_metric_name: False

early_stopping:
  monitor: "val_loss"
  patience: 10
  mode: "min"

model_summary:
  max_depth: 1
