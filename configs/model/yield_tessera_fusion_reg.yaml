_target_: src.models.predictive_model.PredictiveModel

# MultiModalEncoder with a pluggable geo encoder.
# The geo_encoder_cfg replaces the hardcoded GeoClipCoordinateEncoder with
# AverageEncoder(tessera), so the spatial branch uses inter-annual phenology
# instead of static coordinate embeddings.

geo_encoder:
  _target_: src.models.components.geo_encoders.encoder_wrapper.EncoderWrapper

  encoder_branches:
    - encoder:
        _target_: src.models.components.geo_encoders.average_encoder.AverageEncoder
        geo_data_name: tessera
      projector:
        _target_: src.models.components.geo_encoders.mlp_projector.MLPProjector
        nn_layers: 1
        output_dim: 256
    - encoder:
        _target_: src.models.components.geo_encoders.tabular_encoder.TabularEncoder
        output_dim: 256
        dropout_prob: 0.2
        geo_data_name: tabular

  fusion_strategy: "concat"

prediction_head:
  _target_: src.models.components.pred_heads.mlp_regression_head.MLPRegressionPredictionHead
  nn_layers: 2
  hidden_dim: 256
  dropout: 0.2

# geo_encoder includes the tessera AverageEncoder + tabular branch; head is always trained.
trainable_modules: [geo_encoder, prediction_head]
# Disable L2 unit-sphere projection (F.normalize) — regression needs full vector structure, not just direction
normalize_features: false
# Z-score the target before loss; metrics are reported in original yield units
standardize_targets: true

metrics: ${metrics}

optimizer:
  _target_: torch.optim.Adam
  _partial_: true
  lr: 0.001
  weight_decay: 1e-4

scheduler:
  _target_: torch.optim.lr_scheduler.ReduceLROnPlateau
  _partial_: true
  mode: min
  factor: 0.1
  patience: 10

loss_fn:
  _target_: src.models.components.loss_fns.huber_loss.HuberLoss
