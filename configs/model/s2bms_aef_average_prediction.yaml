_target_: src.models.predictive_model.PredictiveModel

geo_encoder:
  _target_: src.models.components.geo_encoders.encoder_wrapper.EncoderWrapper

  encoder_branches:
    - encoder:
        _target_: src.models.components.geo_encoders.average_encoder.AverageEncoder
        geo_data_name: aef
      projector:
        _target_: src.models.components.geo_encoders.mlp_projector.MLPProjector
        nn_layers: 2
        hidden_dim: 256
        output_dim: 256

  fusion_strategy: concat
  normalise: false

prediction_head:
  _target_: src.models.components.pred_heads.mlp_pred_head.MLPPredictionHead

trainable_modules: [prediction_head]

metrics: ${metrics}

optimizer:
  _target_: torch.optim.Adam
  _partial_: true
  lr: 0.001
  weight_decay: 0.0

scheduler:
  _target_: torch.optim.lr_scheduler.ReduceLROnPlateau
  _partial_: true
  mode: min
  factor: 0.1
  patience: 5

loss_fn:
  _target_: src.models.components.loss_fns.bce_loss.BCELoss
