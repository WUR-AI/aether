# @package _global_

# to execute this experiment run:
# python train.py experiment=example

defaults:
  - override /model: s2bms_aef_average_prediction
  - override /data: s2bms_prediction
  - override /metrics: s2bms_predictive

# all parameters below will be merged with parameters from default configurations set above
# this allows you to overwrite only specified parameters

tags:
  - prediction
  - aef
  - aef_128

trainer:
  max_epochs: 100

model:
  trainable_modules: [prediction_head]

data:
  dataset:
    modalities:
      aef:
        format: tif
        size: 128
    use_target_data: true
    use_aux_data: false
  caption_builder:
  pin_memory: true
  num_workers: 14
  batch_size: 128 # TODO: largest possible
  saved_split_file_name: "split_indices_s2bms_2024-08-14-1459_union_aef_tsr_val_test.pth"

logger:
  wandb:
    tags: ${tags}
    group: "predictive"
    project: "s2bms_prediction"
  aim:
    experiment: "predictive"

hydra:
  mode: MULTIRUN
  sweeper:
    params:
      seed: 12345, 404, 654
      model.prediction_head._target_: src.models.components.pred_heads.mlp_pred_head.MLPPredictionHead, src.models.components.pred_heads.linear_pred_head.LinearPredictionHead
#      +data.dataset.modalities.aef.size: 128, 256
