# @package _global_
# Guatemala performance: R2=0.323, RMSE=1.607, MAE=1.344
# Kraków performance: R2=0.450, RMSE=1.519, MAE=1.183
defaults:
  - override /model: heat_geoclip_reg
  - override /data: heat_krakow
  - override /metrics: krakow_regression
tags: ["heat_island", "krakow", "coords", "regression"]
seed: 12345
trainer:
  min_epochs: 1
  max_epochs: 100
data:
  batch_size: 64
callbacks:
  model_checkpoint:
    monitor: val_r2
    mode: max
  early_stopping:
    monitor: val_r2
    mode: max
    patience: 20
logger:
  wandb:
    tags: ${tags}
    group: "heat_island"
  aim:
    experiment: "heat_island"
