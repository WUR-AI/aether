# @package _global_

# to execute this experiment run:
# python train.py experiment=example

# Tessera with average encoder and MLP prediction head with larger hidden dim (512), for tile sizes 128 and 256, each with 3 random seeds

defaults:
  - override /model: s2bms_prediction
  - override /data: s2bms_prediction
  - override /metrics: s2bms_predictive

tags:
  - prediction
  - tessera
  - tessera_${str:${data.dataset.modalities.tessera.size}}
  - ${str:${seed}}

experiment_name: avr_tessera_${str:${data.dataset.modalities.tessera.size}}_mlp_bigger

model:
  geo_encoder:
    _target_: src.models.components.geo_encoders.average_encoder.AverageEncoder
    geo_data_name: tessera
  trainable_modules: [prediction_head]
  prediction_head:
    _target_: src.models.components.pred_heads.mlp_pred_head.MLPPredictionHead
    hidden_dim: 512

data:
  dataset:
    modalities:
      tessera:
        format: npy
        enable_nans: true
    use_target_data: true
    use_aux_data: false
  caption_builder:
  pin_memory: false
  num_workers: 14
  batch_size: 128
  persistent_workers: false
  saved_split_file_name: "split_indices_s2bms_2024-08-14-1459_union_aef_tsr_val_test_train.pth"

logger:
  wandb:
    tags: ${tags}
    group: "predictive"
    project: "s2bms_prediction"
  aim:
    experiment: "predictive"

hydra:
  mode: MULTIRUN
  sweeper:
    params:
      seed: 12345, 404, 654
      +data.dataset.modalities.tessera.size: 128, 256
