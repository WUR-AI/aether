# @package _global_
# Ablation config G — tessera + tessera_prev, dynamic_gate, no tabular features.
#
# Mirrors config E but removes all tabular features. Directly quantifies the
# marginal contribution of the tabular branch within the full dual-year model:
# comparing E (with tabular) against G (without) shows how much soil/climate
# features add on top of the dual-year TESSERA signal alone.
# Comparing G against F shows the incremental gain of the year-Y−1 embedding
# when no tabular data is available (pure embedding model).
#
# Requires: ABLATION_SPLIT — set saved_split_file_name to the file saved by config A.

defaults:
  - override /model: yield_tessera_dual_no_tab_fusion_reg
  - override /data: yield_africa_tessera_dual_KEN
  - override /metrics: yield_africa_regression

tags: ["yield_africa", "tessera_ablation", "KEN", "config_G"]
seed: 12345

trainer:
  min_epochs: 1
  max_epochs: 150

data:
  batch_size: 64
  split_mode: from_file
  saved_split_file_name: split_indices_2026-04-27-1644.pth
  dataset:
    use_features: false

logger:
  wandb:
    name: "ablation_G_dynamic_no_tab"
    tags: ${tags}
    group: "ablation_dual_tessera_KEN"
  aim:
    experiment: "yield_africa_ablation"
