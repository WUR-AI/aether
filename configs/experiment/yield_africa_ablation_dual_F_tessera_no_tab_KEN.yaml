# @package _global_
# Ablation config F — tessera (year Y) only, no tabular features.
#
# Mirrors config A but removes all tabular features to quantify their contribution.
# The RMSE difference (F − A) gives the accuracy cost of discarding tabular
# soil/climate features and predicting from the year-Y TESSERA embedding alone.
#
# Requires: ABLATION_SPLIT — set saved_split_file_name to the file saved by config A.

defaults:
  - override /model: yield_tessera_only_proj_reg
  - override /data: yield_africa_tessera_KEN
  - override /metrics: yield_africa_regression

tags: ["yield_africa", "tessera_ablation", "KEN", "config_F"]
seed: 12345

trainer:
  min_epochs: 1
  max_epochs: 150

data:
  batch_size: 64
  split_mode: from_file
  saved_split_file_name: split_indices_2026-04-27-1644.pth
  dataset:
    use_features: false

logger:
  wandb:
    name: "ablation_F_tessera_no_tab"
    tags: ${tags}
    group: "ablation_dual_tessera_KEN"
  aim:
    experiment: "yield_africa_ablation"
