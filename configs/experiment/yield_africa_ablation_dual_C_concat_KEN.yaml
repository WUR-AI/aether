# @package _global_
# Ablation config C — tessera + tessera_prev + tabular, concat fusion.
#
# All three branches are concatenated into a single wide vector (3 × 256 = 768-d)
# before the prediction head. This is a non-adaptive baseline for the dual-year
# signal: both year-Y and year-Y−1 embeddings always contribute equally, with no
# mechanism to down-weight the less informative branch.
#
# Requires: ABLATION_SPLIT — set saved_split_file_name to the file saved by config A.

defaults:
  - override /model: yield_tessera_dual_fusion_reg
  - override /data: yield_africa_tessera_dual_KEN
  - override /metrics: yield_africa_regression

tags: ["yield_africa", "tessera_ablation", "KEN", "config_C"]
seed: 12345

trainer:
  min_epochs: 1
  max_epochs: 150
  gradient_clip_val: 1.0

data:
  batch_size: 64
  split_mode: from_file
  saved_split_file_name: split_indices_2026-04-27-1644.pth
  dataset:
    use_features: true

model:
  geo_encoder:
    fusion_strategy: "concat"

logger:
  wandb:
    name: "ablation_C_concat"
    tags: ${tags}
    group: "ablation_dual_tessera_KEN"
  aim:
    experiment: "yield_africa_ablation"
