# @package _global_

# to execute this experiment run:
# python train.py experiment=example

# SSL4EO features (from Resnet (18 or 50) s2-rgb, pretrained by SSL4EO, and frozen) and MLP prediction head, for tile sizes 128 and 256, each with 3 random seeds

defaults:
  - override /model: s2bms_prediction
  - override /data: s2bms_prediction
  - override /metrics: s2bms_predictive

tags:
  - prediction
  - s2
  - s2_${str:${data.dataset.modalities.s2.size}}
  - ${str:${seed}}

experiment_name: rn${str:${model.geo_encoder.resnet_version}}_ssl4eo_${str:${data.dataset.modalities.s2.size}}_${str:${data.dataset.modalities.s2.channels}}_mlp

model:
  geo_encoder:
    _target_: src.models.components.geo_encoders.cnn_encoder.CNNEncoder
    geo_data_name: s2
    input_n_bands: 3
  prediction_head:
    _target_: src.models.components.pred_heads.mlp_pred_head.MLPPredictionHead
  trainable_modules: [prediction_head]

data:
  dataset:
    modalities:
      s2:
        format: tif
        dtype: float32
        preprocessing: div_10000
        channels: rgb
    use_target_data: true
    use_aux_data: false
    dtype: float32
  caption_builder:
  num_workers: 4
  batch_size: 128
  persistent_workers: true
  prefetch_factor: 2
  saved_split_file_name: "split_indices_s2bms_2024-08-14-1459_union_aef_tsr_val_test.pth"

logger:
  wandb:
    tags: ${tags}
    group: "predictive"
    project: "s2bms_prediction"
  aim:
    experiment: "predictive"

hydra:
  mode: MULTIRUN
  sweeper:
    params:
      seed: 12345, 404, 654
      ++data.dataset.modalities.s2.size: 128, 256
      ++model.geo_encoder.resnet_version: 18, 50
