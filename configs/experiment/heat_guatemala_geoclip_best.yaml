# @package _global_
# Best config: R2=0.323, RMSE=1.607, MAE=1.344
defaults:
  - override /model: heat_geoclip_best
  - override /data: heat_guatemala
  - override /metrics: guatemala_regression
tags: ["heat_island", "guatemala", "coords", "best", "regression"]
seed: 12345
trainer:
  min_epochs: 1
  max_epochs: 100
data:
  batch_size: 64
callbacks:
  model_checkpoint:
    monitor: val_r2
    mode: max
  early_stopping:
    monitor: val_r2
    mode: max
    patience: 20
logger:
  wandb:
    tags: ${tags}
    group: "heat_island"
  aim:
    experiment: "heat_island"
