_target_: src.data.base_datamodule.BaseDataModule

dataset:
  _target_: src.data.satbird_dataset.SatBirdDataset

  data_dir: ${paths.data_dir}
  modalities:
    coords:
  use_target_data: true
  use_aux_data: none
  seed: ${seed}
  cache_dir: ${paths.cache_dir}
