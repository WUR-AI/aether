_target_: src.data.base_datamodule.BaseDataModule

dataset:
  _target_: src.data.yield_africa_dataset.YieldAfricaDataset
  data_dir: ${paths.data_dir}
  modalities:
    tessera:
      size: 9
      format: npy
  csv_name: null
  use_target_data: true
  use_features: true
  use_aux_data:
    aux:
      pattern: "^aux_(?!.*top).*"
  seed: ${seed}
  cache_dir: ${paths.cache_dir}
  countries: ["BF", "BUR", "ETH", "KEN", "MAL", "RWA", "TAN", "ZAM"]
  years: [2014, 2016, 2017, 2018, 2019, 2020, 2021, 2023, 2024]
  exclude_countries: null
  exclude_years: null

caption_builder:
  _target_: src.data.yield_africa_caption_builder.YieldAfricaCaptionBuilder
  templates_fname: v1.json
  concepts_fname: v1.json
  data_dir: ${paths.data_dir}/yield_africa
  seed: ${seed}

batch_size: 64
num_workers: 0
pin_memory: false

split_mode: "random"
train_val_test_split: [0.7, 0.15, 0.15]
save_split: false
seed: ${seed}
